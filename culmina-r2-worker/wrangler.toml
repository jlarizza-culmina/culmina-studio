name = "culmina-r2-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# R2 bucket bindings — Workers access these directly, no API keys needed
[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "culmina-docs"

[[r2_buckets]]
binding = "DIST_BUCKET"
bucket_name = "culmina-dist"

# Environment variables for auth
[vars]
ALLOWED_ORIGINS = "https://studio.culmina.ai,http://localhost:5173"

# Supabase JWT verification
# Set these as secrets via: wrangler secret put SUPABASE_JWT_SECRET
# wrangler secret put SUPABASE_URL
